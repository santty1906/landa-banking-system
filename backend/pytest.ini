[pytest]
testpaths = tests
python_files = test_*.py
addopts =
    -ra
    --strict-config
    --strict-markers
    --cov=app
    --cov-branch
    --cov-report=term-missing:skip-covered
    --cov-report=xml
    --cov-fail-under=80
    -m "not integration and not face_provider"
markers =
    unit: Fast deterministic tests for isolated functions/modules.
    integration: Tests using real infrastructure components (PostgreSQL).
    api: HTTP contract and endpoint behavior tests.
    security: Authentication/authorization and security behavior tests.
    auth: Authentication token and dependency tests.
    face_contract: Provider-independent facial recognition contract tests.
    face_provider: Heavy provider-specific facial recognition tests.
filterwarnings =
    error::DeprecationWarning:app.*
    error::PendingDeprecationWarning:app.*
