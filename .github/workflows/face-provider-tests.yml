name: Face Provider Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

permissions:
  contents: read

jobs:
  backend-face-provider-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run heavy face provider tests
        env:
          RUN_FACE_PROVIDER_TESTS: "1"
        run: |
          pytest \
            -o addopts='' \
            --strict-config \
            --strict-markers \
            -m face_provider
