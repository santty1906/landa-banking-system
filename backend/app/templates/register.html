{% extends "layout.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-11 col-sm-8 col-md-6 col-lg-4">
        <div class="card shadow-sm border-0 rounded-4">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <div class="bank-icon mb-3">
                        <i class="bi bi-person-plus text-danger" style="font-size: 3rem;"></i>
                    </div>
                    <h4 class="fw-bold">Create Account</h4>
                    <p class="text-muted small">Join LANDA Bank today</p>
                </div>

                <form method="POST" action="{{ url_for('auth.register') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label small fw-medium">Username</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" name="username" class="form-control" placeholder="Choose a username" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">Email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" name="password" class="form-control" placeholder="At least 8 characters" required minlength="8">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-medium">Confirm Password</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" name="confirm_password" class="form-control" placeholder="Repeat password" required minlength="8">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-danger w-100 py-2 fw-bold mb-3 rounded-3">
                        <i class="bi bi-person-check me-2"></i>Create Account
                    </button>
                </form>

                <div class="text-center">
                    <small class="text-muted">
                        Already have an account?
                        <a href="{{ url_for('auth.login') }}" class="text-danger fw-medium">Sign In</a>
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
