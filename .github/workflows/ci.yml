name: CI

on:
  pull_request:
  push:
    branches: ["main"]

permissions:
  contents: read

jobs:
  backend-lint-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Lint backend
        run: ruff check app tests

      - name: Syntax check
        run: python -m compileall app

  backend-fast-tests:
    runs-on: ubuntu-latest
    needs: backend-lint-build
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run fast deterministic suites with global coverage gate
        run: |
          pytest \
            -o addopts='' \
            --strict-config \
            --strict-markers \
            -m 'unit or api or security or auth or face_contract' \
            --cov=app \
            --cov-branch \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage-fast.xml \
            --cov-fail-under=80

      - name: Run critical-module coverage gate
        run: |
          pytest \
            -o addopts='' \
            --strict-config \
            --strict-markers \
            tests/unit/test_jwt.py \
            tests/unit/test_exceptions.py \
            tests/unit/test_auth_dependency.py \
            tests/security \
            --cov=app/api/dependencies/auth.py \
            --cov=app/infrastructure/security/jwt.py \
            --cov=app/core/exceptions.py \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=90

  backend-integration-tests:
    runs-on: ubuntu-latest
    needs: backend-fast-tests
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: landa_test
          POSTGRES_USER: landa_user
          POSTGRES_PASSWORD: change_me
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U landa_user -d landa_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: landa_test
      POSTGRES_USER: landa_user
      POSTGRES_PASSWORD: change_me
      JWT_SECRET_KEY: test_secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt

      - name: Run migrations
        run: alembic upgrade head

      - name: Run integration tests against PostgreSQL
        run: |
          pytest \
            -o addopts='' \
            --strict-config \
            --strict-markers \
            -m integration

  frontend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Flutter pub get
        run: |
          cd frontend
          flutter pub get

      - name: Flutter analyze
        run: |
          cd frontend
          flutter analyze
